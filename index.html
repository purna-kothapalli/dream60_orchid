<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream60 - Live Hourly Auctions</title>
    <meta name="description" content="Join Dream60 - Win amazing prizes every hour in live 60-minute auctions!" />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6B3FA0" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://dev-api.dream60.com" />
    <link rel="dns-prefetch" href="https://dev-api.dream60.com" />
    
    <script>
      // Disable right-click
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // PWA Global Prompt Capture
      window.deferredPWAPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPWAPrompt = e;
        console.log('✅ [PWA] Global beforeinstallprompt captured');
        // Dispatch custom event to notify components
        window.dispatchEvent(new CustomEvent('pwa-prompt-captured'));
      });
    </script>
  </head>
  <body oncontextmenu="return false;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
